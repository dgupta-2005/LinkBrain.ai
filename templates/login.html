<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LinkBrain.ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(28,100%,74%,0.15) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(189,100%,56%,0.15) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,100%,74%,0.15) 0, transparent 50%);
            background-attachment: fixed;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.90);
            backdrop-filter: blur(24px);
            border: 2px solid #3b82f6; /* Vibrant Tailwind blue-500 */
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.15), 0 10px 10px -5px rgba(59, 130, 246, 0.08);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glass-card w-full max-w-md p-8 rounded-3xl">
        <div class="text-center mb-8 border-b border-slate-200 pb-6">
            <h1 class="text-4xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-indigo-500 tracking-tight">LinkBrain.ai</h1>
            <p class="text-sm text-slate-500 font-medium">Your AI-powered knowledge base from social media.</p>
        </div>
        <h2 class="text-2xl font-bold mb-6 text-center text-slate-800">Welcome Back</h2>
        
        {% if error %}
            <div class="bg-red-50 border border-red-200 text-red-600 p-3 rounded-xl mb-6 text-sm font-bold shadow-sm text-center">{{ error }}</div>
        {% endif %}
        
        <form action="/login" method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1.5">Email Address</label>
                <input type="email" name="username" placeholder="you@company.com" required class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-slate-800 shadow-sm transition-all font-medium placeholder-slate-400">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1.5">Password</label>
                <input type="password" name="password" required class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-slate-800 shadow-sm transition-all font-medium placeholder-slate-400">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3 rounded-xl transition-all transform hover:-translate-y-0.5 shadow-md hover:shadow-lg mt-4">Sign In</button>
        </form>
        
        <p class="mt-8 text-center text-slate-500 text-sm font-medium">
            Don't have an account? <a href="/register" class="text-blue-600 font-bold hover:text-blue-500 transition-colors">Register here</a>
        </p>
    </div>
</body>
</html>
